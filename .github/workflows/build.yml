name: Build UEFI Application

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout EDK II
      run: |
        git clone --depth 1 https://github.com/tianocore/edk2.git
        cd edk2
        git submodule update --init --depth 1
        
    - name: Checkout your code
      uses: actions/checkout@v4
      with:
        path: edk2/MdeModulePkg/MyApps
        
    - name: Create DSC file
      run: |
        cd edk2
        echo '[Defines]' > MdeModulePkg/MyApps.dsc
        echo '  PLATFORM_NAME                  = MyApp' >> MdeModulePkg/MyApps.dsc
        echo '  PLATFORM_GUID                  = 12345678-1234-1234-1234-123456789ABC' >> MdeModulePkg/MyApps.dsc
        echo '  PLATFORM_VERSION               = 1.0' >> MdeModulePkg/MyApps.dsc
        echo '  DSC_SPECIFICATION              = 0x00010005' >> MdeModulePkg/MyApps.dsc
        echo '  OUTPUT_DIRECTORY               = Build/MyApp' >> MdeModulePkg/MyApps.dsc
        echo '  SUPPORTED_ARCHITECTURES        = IA32|X64' >> MdeModulePkg/MyApps.dsc
        echo '  BUILD_TARGETS                  = DEBUG|RELEASE' >> MdeModulePkg/MyApps.dsc
        echo '  SKUID_IDENTIFIER               = DEFAULT' >> MdeModulePkg/MyApps.dsc
        echo '' >> MdeModulePkg/MyApps.dsc
        echo '[LibraryClasses]' >> MdeModulePkg/MyApps.dsc
        echo '  UefiApplicationEntryPoint|MdePkg/Library/UefiApplicationEntryPoint/UefiApplicationEntryPoint.inf' >> MdeModulePkg/MyApps.dsc
        echo '  UefiLib|MdePkg/Library/UefiLib/UefiLib.inf' >> MdeModulePkg/MyApps.dsc
        echo '  UefiBootServicesTableLib|MdePkg/Library/UefiBootServicesTableLib/UefiBootServicesTableLib.inf' >> MdeModulePkg/MyApps.dsc
        echo '  MemoryAllocationLib|MdePkg/Library/UefiMemoryAllocationLib/UefiMemoryAllocationLib.inf' >> MdeModulePkg/MyApps.dsc
        echo '  BaseMemoryLib|MdePkg/Library/BaseMemoryLib/BaseMemoryLib.inf' >> MdeModulePkg/MyApps.dsc
        echo '  BaseLib|MdePkg/Library/BaseLib/BaseLib.inf' >> MdeModulePkg/MyApps.dsc
        echo '  DebugLib|MdePkg/Library/UefiDebugLibStdErr/UefiDebugLibStdErr.inf' >> MdeModulePkg/MyApps.dsc
        echo '  PrintLib|MdePkg/Library/BasePrintLib/BasePrintLib.inf' >> MdeModulePkg/MyApps.dsc
        echo '' >> MdeModulePkg/MyApps.dsc
        echo '[Components]' >> MdeModulePkg/MyApps.dsc
        echo '  MdeModulePkg/MyApps/MemoryReader.inf' >> MdeModulePkg/MyApps.dsc
        echo '' >> MdeModulePkg/MyApps.dsc
        echo '[BuildOptions]' >> MdeModulePkg/MyApps.dsc
        echo '  *_*_*_CC_FLAGS = -D DISABLE_NEW_DEPRECATED_INTERFACES' >> MdeModulePkg/MyApps.dsc
        
    - name: Build EDK2 BaseTools
      run: |
        cd edk2
        make -C BaseTools
        
    - name: Setup EDK2 environment
      run: |
        cd edk2
        . edksetup.sh
        
    - name: Build UEFI application
      run: |
        cd edk2
        build -a X64 -p MdeModulePkg/MyApps.dsc -b RELEASE -t GCC5
        
    - name: Find and upload EFI file
      uses: actions/upload-artifact@v4
      with:
        name: MemoryReader
        path: edk2/Build/MyApp/RELEASE_*/X64/MemoryReader.efi
