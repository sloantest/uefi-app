name: Build UEFI Application

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout EDK II
      run: |
        git clone --depth 1 https://github.com/tianocore/edk2.git
        cd edk2
        git submodule update --init --depth 1
        
    - name: Checkout your code
      uses: actions/checkout@v4
      with:
        path: edk2/MdeModulePkg/MyApps
        
    - name: Setup EDK II environment
      run: |
        cd edk2
        make -C BaseTools
        . edksetup.sh
        
    - name: Add application to build
      run: |
        cd edk2
        # Create a minimal DSC file that includes your app
        cat > MdeModulePkg/MyApps.dsc << 'EOF'
[Defines]
  PLATFORM_NAME                  = MyApp
  PLATFORM_GUID                  = 12345678-1234-1234-1234-123456789ABC
  PLATFORM_VERSION               = 1.0
  DSC_SPECIFICATION              = 0x00010005
  OUTPUT_DIRECTORY               = Build/MyApp
  SUPPORTED_ARCHITECTURES        = IA32|X64
  BUILD_TARGETS                  = DEBUG|RELEASE
  SKUID_IDENTIFIER               = DEFAULT

[LibraryClasses]
  UefiApplicationEntryPoint|MdePkg/Library/UefiApplicationEntryPoint/UefiApplicationEntryPoint.inf
  UefiLib|MdePkg/Library/UefiLib/UefiLib.inf
  UefiBootServicesTableLib|MdePkg/Library/UefiBootServicesTableLib/UefiBootServicesTableLib.inf
  MemoryAllocationLib|MdePkg/Library/UefiMemoryAllocationLib/UefiMemoryAllocationLib.inf
  BaseMemoryLib|MdePkg/Library/BaseMemoryLib/BaseMemoryLib.inf
  BaseLib|MdePkg/Library/BaseLib/BaseLib.inf
  DebugLib|MdePkg/Library/UefiDebugLibStdErr/UefiDebugLibStdErr.inf
  PrintLib|MdePkg/Library/BasePrintLib/BasePrintLib.inf

[Components]
  MdeModulePkg/MyApps/MemoryReader.inf

[BuildOptions]
  *_*_*_CC_FLAGS = -D DISABLE_NEW_DEPRECATED_INTERFACES
EOF
        
    - name: Build UEFI application
      run: |
        cd edk2
        build -a X64 -p MdeModulePkg/MyApps.dsc -b RELEASE
        
    - name: List build output
      run: |
        cd edk2
        find Build -name "*.efi" -type f
        
    - name: Upload EFI file
      uses: actions/upload-artifact@v4
      with:
        name: MemoryReader
        path: edk2/Build/MyApp/RELEASE_*/X64/MemoryReader.efi
