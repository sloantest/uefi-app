name: Build UEFI Application

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        # python3-distutils is deprecated, use python3-full instead
        sudo apt-get install -y build-essential uuid-dev nasm python3 python3-full iasl
        
    - name: Checkout EDK II
      run: |
        git clone --depth 1 --recursive https://github.com/tianocore/edk2.git
        cd edk2
        git submodule update --init --recursive --depth 1
        
    - name: Checkout your code
      uses: actions/checkout@v4
      with:
        path: edk2/MdeModulePkg/MyApps
        
    - name: Setup EDK2
      run: |
        cd edk2
        make -C BaseTools
        . edksetup.sh
        echo "WORKSPACE=$PWD" >> $GITHUB_ENV
        echo "EDK_TOOLS_PATH=$PWD/BaseTools" >> $GITHUB_ENV
        
    - name: Build OvmfPkg
      run: |
        cd edk2
        # Add your app to the build
        sed -i '/\[Components\.X64\]/a\  MdeModulePkg/MyApps/MemoryReader.inf' OvmfPkg/OvmfPkgX64.dsc
        build -a X64 -p OvmfPkg/OvmfPkgX64.dsc -b RELEASE -t GCC5
        
    - name: Upload EFI file
      uses: actions/upload-artifact@v4
      with:
        name: MemoryReader
        path: edk2/Build/OvmfX64/RELEASE_GCC5/X64/MemoryReader.efi
