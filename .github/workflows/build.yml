name: Build Simple UEFI App (Fast)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install MinGW cross-compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-mingw-w64-x86-64
        
    - name: Create UEFI application
      run: |
        cat > main.c << 'EOF'
typedef unsigned long long UINT64;
typedef unsigned int UINT32;
typedef unsigned short UINT16;
typedef unsigned char UINT8;
typedef UINT64 EFI_STATUS;
typedef void* EFI_HANDLE;

#define EFI_SUCCESS 0

typedef struct {
    UINT16 ScanCode;
    UINT16 UnicodeChar;
} EFI_INPUT_KEY;

typedef struct {
    void* Reset;
    EFI_STATUS (*OutputString)(void* This, UINT16* String);
    void* TestString;
    void* QueryMode;
    void* SetMode;
    void* SetAttribute;
    void* ClearScreen;
    void* SetCursorPosition;
    void* EnableCursor;
    void* Mode;
} EFI_SIMPLE_TEXT_OUTPUT_PROTOCOL;

typedef struct {
    void* Hdr;
    UINT16* FirmwareVendor;
    UINT32 FirmwareRevision;
    EFI_HANDLE ConsoleInHandle;
    void* ConIn;
    EFI_HANDLE ConsoleOutHandle;
    EFI_SIMPLE_TEXT_OUTPUT_PROTOCOL* ConOut;
    EFI_HANDLE StandardErrorHandle;
    EFI_SIMPLE_TEXT_OUTPUT_PROTOCOL* StdErr;
    void* RuntimeServices;
    void* BootServices;
    UINT64 NumberOfTableEntries;
    void* ConfigurationTable;
} EFI_SYSTEM_TABLE;

EFI_STATUS EFIAPI efi_main(EFI_HANDLE ImageHandle, EFI_SYSTEM_TABLE* SystemTable) {
    SystemTable->ConOut->OutputString(SystemTable->ConOut, L"Hello from UEFI!\n");
    SystemTable->ConOut->OutputString(SystemTable->ConOut, L"Built with MinGW in 30 seconds!\n");
    return EFI_SUCCESS;
}
EOF
        
    - name: Compile
      run: |
        x86_64-w64-mingw32-gcc -ffreestanding -fshort-wchar -fno-stack-protector \
            -mno-red-zone -c main.c -o main.o
        x86_64-w64-mingw32-ld -shared -Bsymbolic -nostdlib -znocombreloc \
            -o main.dll main.o
        cp main.dll HelloUEFI.efi
        
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: HelloUEFI
        path: HelloUEFI.efi
